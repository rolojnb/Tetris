<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TETRIS DELUXE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #050510;
    --panel: #0a0a1f;
    --border: #1a1a4a;
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-yellow: #ffee00;
    --neon-green: #39ff14;
    --text: #c0c0ff;
    --dim: #4040a0;
    --achievement-bg: rgba(0,0,0,0.85);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
    transition: background 0.3s, color 0.3s;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(0,245,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(255,0,110,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    pointer-events: none;
    z-index: 999;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 500px;
    padding: 8px;
    gap: 6px;
  }

  .header { text-align: center; padding: 6px 0 2px; }
  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    letter-spacing: 0.3em;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan), 0 0 30px var(--neon-cyan);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.85; } }

  .main-area {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    width: 100%;
  }

  #canvas {
    border: 2px solid var(--neon-cyan);
    box-shadow: 0 0 10px var(--neon-cyan), 0 0 30px rgba(0,245,255,0.3), inset 0 0 20px rgba(0,245,255,0.05);
    background: #020210;
    display: block;
    flex-shrink: 0;
    transition: transform 0.05s linear;
  }

  .side {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 100px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
  }
  .panel-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .panel-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px var(--neon-yellow);
  }
  .panel-value.pink { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
  .panel-value.green { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

  .mini-canvas {
    width: 70px;
    height: 70px;
    background: #020210;
    border: 1px solid var(--border);
    border-radius: 2px;
    display: block;
    margin-top: 4px;
  }

  .level-bar { display: flex; gap: 2px; margin-top: 4px; }
  .level-dot { flex: 1; height: 4px; background: var(--border); border-radius: 2px; transition: background 0.3s; }
  .level-dot.active { background: var(--neon-green); box-shadow: 0 0 6px var(--neon-green); }

  .controls-area { width: 100%; display: flex; flex-direction: column; gap: 6px; padding: 0 4px; }
  .btn-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
  .btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 0;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.05s linear;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .btn:active { transform: scale(0.95); }
  .btn-dir { width: 52px; height: 52px; font-size: 1.4rem; border-color: var(--neon-cyan); }
  .btn-rotate { width: 68px; height: 68px; font-size: 1.8rem; border-color: var(--neon-pink); border-radius: 50%; }
  .btn-drop { flex: 1; height: 40px; font-size: 0.65rem; border-color: var(--neon-yellow); }
  .btn-action { height: 34px; padding: 0 12px; font-size: 0.6rem; }
  #btn-start { border-color: var(--neon-green); color: var(--neon-green); }
  #btn-sound { border-color: var(--dim); }
  #btn-sound.active { border-color: var(--neon-cyan); color: var(--neon-cyan); }

  .diff-row, .theme-row { display: flex; gap: 4px; margin-top: 2px; }
  .diff-btn, .theme-btn {
    flex: 1;
    height: 26px;
    font-size: 0.55rem;
    border-color: var(--dim);
    color: var(--dim);
    border-radius: 3px;
  }
  .diff-btn.selected, .theme-btn.selected { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0,245,255,0.08); box-shadow: 0 0 8px rgba(0,245,255,0.3); }

  .footer { margin-top: 8px; padding-bottom: 4px; font-size: 0.5rem; color: var(--dim); text-align: center; }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(2,2,16,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 16px;
    backdrop-filter: blur(4px);
  }
  #overlay.hidden { display: none; }
  .overlay-title { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2rem; color: var(--neon-cyan); text-shadow: 0 0 20px var(--neon-cyan); letter-spacing: 0.2em; }
  .overlay-btn { margin-top: 8px; padding: 10px 28px; background: transparent; border: 2px solid var(--neon-green); color: var(--neon-green); border-radius: 4px; cursor: pointer; }

  .achievement-toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--achievement-bg);
    backdrop-filter: blur(8px);
    border-left: 4px solid var(--neon-yellow);
    padding: 8px 16px;
    border-radius: 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    color: var(--neon-yellow);
    z-index: 200;
    animation: slideUp 0.3s ease-out;
    pointer-events: none;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .flash { animation: flashAnim 0.3s ease-out; }
  @keyframes flashAnim {
    0% { box-shadow: 0 0 10px var(--neon-cyan); }
    50% { box-shadow: 0 0 30px white, 0 0 80px white; }
    100% { box-shadow: 0 0 10px var(--neon-cyan); }
  }
</style>
</head>
<body>

<div id="overlay">
  <div class="overlay-title">TETRIS</div>
  <div class="overlay-sub" id="overlay-msg">PRESIONA JUGAR</div>
  <div class="overlay-score" id="overlay-score" style="display:none"></div>
  <button class="overlay-btn" id="overlay-btn">▶ JUGAR</button>
</div>

<div id="app">
  <div class="header"><div class="logo">TETRIS</div></div>

  <div class="main-area">
    <canvas id="canvas"></canvas>
    <div class="side">
      <div class="panel"><div class="panel-label">Puntos</div><div class="panel-value" id="score-display">0</div></div>
      <div class="panel"><div class="panel-label">Récord</div><div class="panel-value pink" id="hi-display">0</div></div>
      <div class="panel"><div class="panel-label">Líneas</div><div class="panel-value green" id="lines-display">0</div></div>
      <div class="panel"><div class="panel-label">Combo</div><div class="panel-value" id="combo-display">0</div></div>
      <div class="panel"><div class="panel-label">Nivel</div><div class="panel-value" id="level-display">1</div><div class="level-bar"><div class="level-dot" id="ld1"></div><div class="level-dot" id="ld2"></div><div class="level-dot" id="ld3"></div><div class="level-dot" id="ld4"></div><div class="level-dot" id="ld5"></div></div></div>
      <div class="panel"><div class="panel-label">Siguiente</div><canvas id="next-canvas" class="mini-canvas"></canvas></div>
      <div class="panel"><div class="panel-label">HOLD</div><canvas id="hold-canvas" class="mini-canvas"></canvas></div>
    </div>
  </div>

  <div class="controls-area">
    <div style="display:flex; gap:6px; justify-content:center; flex-wrap:wrap;">
      <div><div class="section-label">Dificultad</div><div class="diff-row"><button class="btn diff-btn selected" id="diff-easy">FÁCIL</button><button class="btn diff-btn" id="diff-med">MEDIO</button><button class="btn diff-btn" id="diff-hard">DIFÍCIL</button></div></div>
      <div><div class="section-label">Tema</div><div class="theme-row"><button class="btn theme-btn selected" data-theme="cyberpunk">⚡</button><button class="btn theme-btn" data-theme="retro">📺</button><button class="btn theme-btn" data-theme="ocean">🌊</button></div></div>
      <div style="display:flex; gap:6px; align-items:flex-end;"><button class="btn btn-action" id="btn-start">JUGAR</button><button class="btn btn-action" id="btn-pause">⏸</button><button class="btn btn-action" id="btn-sound">🔇</button><button class="btn btn-action" id="btn-timeattack">⏱️</button></div>
    </div>

    <div style="display:flex; align-items:center; justify-content:space-between; padding:0 8px;">
      <div style="display:grid; grid-template-columns: 52px 52px 52px; grid-template-rows: 52px 52px; gap:4px;">
        <div></div><button class="btn btn-dir" id="btn-up">▲</button><div></div>
        <button class="btn btn-dir" id="btn-left">◀</button><button class="btn btn-dir" id="btn-down">▼</button><button class="btn btn-dir" id="btn-right">▶</button>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center;"><div class="section-label">ROTAR</div><button class="btn btn-rotate" id="btn-rotate">↻</button><button class="btn btn-action" id="btn-hold" style="margin-top:6px; width:60px;">HOLD</button></div>
    </div>
    <div class="btn-row"><button class="btn btn-drop" id="btn-drop">⬇ CAÍDA RÁPIDA</button></div>
  </div>
  <div class="footer">Nexar Sistemas • Modos: Normal / ⏱️ Contrarreloj</div>
</div>

<script>
// ======================== CONFIGURACIÓN =========================
const COLS = 10, ROWS = 20;
const CELL = Math.min(Math.floor((window.innerHeight * 0.48) / ROWS), 28);
const COLORS = ['','#00f5ff','#ff006e','#ffee00','#39ff14','#ff8c00','#bf00ff','#ff4500'];
const GLOWS =  ['','rgba(0,245,255,0.8)','rgba(255,0,110,0.8)','rgba(255,238,0,0.8)','rgba(57,255,20,0.8)','rgba(255,140,0,0.8)','rgba(191,0,255,0.8)','rgba(255,69,0,0.8)'];

const PIECES = [
  null,
  [[1,1,1,1]],
  [[2,2],[2,2]],
  [[0,3,0],[3,3,3]],
  [[4,0],[4,0],[4,4]],
  [[0,5],[0,5],[5,5]],
  [[6,6,0],[0,6,6]],
  [[0,7,7],[7,7,0]]
];

const SPEEDS = {easy: 700, medium: 450, hard: 250};
const DIFF_FACTOR = {easy: 0.92, medium: 0.85, hard: 0.78};

// Canvas
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;
const nextCanvas = document.getElementById('next-canvas');
const nctx = nextCanvas.getContext('2d');
const holdCanvas = document.getElementById('hold-canvas');
const hctx = holdCanvas.getContext('2d');

// Estado del juego
let board, piece, pieceX, pieceY, nextPiece, holdPiece = null, canHold = true;
let score, hiScore, lines, level, combo, gameOver, paused, running, timeAttackMode = false, timeLeft = 0;
let dropInterval, fallTimer;
let difficulty = 'easy';
let soundEnabled = false;
let audioCtx = null;
let particles = [];
let achievements = {
  '100_lines': { name: 'Centurión', unlocked: false, condition: () => lines >= 100 },
  'combo_5': { name: 'Racha Imparable', unlocked: false, condition: () => combo >= 5 },
  'tetris_4': { name: 'Tetris!', unlocked: false, condition: () => false }
};
let autoSaveInterval = null;

// ======================== AUDIO =========================
function initAudio() {
  if (!audioCtx && soundEnabled) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function playTone(freq, type, dur, vol=0.2) {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function soundMove() { playTone(180, 'square', 0.04, 0.08); }
function soundRotate() { playTone(320, 'triangle', 0.07, 0.12); }
function soundPlace() { playTone(110, 'sine', 0.12, 0.15); }
function soundLine(cleared) {
  if(cleared===1) playTone(440,'sine',0.2,0.3);
  else if(cleared===2) playTone(523,'sine',0.25,0.35);
  else if(cleared===3) playTone(659,'sine',0.3,0.4);
  else if(cleared>=4) { [523,659,784].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.2,0.4),i*80)); }
}
function soundGameOver() { [300,250,200,150,100].forEach((f,i)=>setTimeout(()=>playTone(f,'sawtooth',0.3,0.3),i*100)); }
function soundLevelUp() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'triangle',0.15,0.4),i*70)); }
function soundAchievement() { playTone(880,'sine',0.3,0.5); playTone(1318,'sine',0.3,0.5); }

// ======================== PARTÍCULAS (RÁPIDAS Y PEQUEÑAS) =========================
class Particle {
  constructor(x, y, colorIdx) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 10;      // más rápido
    this.vy = (Math.random() - 0.5) * 10 - 2;  // más rápido
    this.life = 0.6;                           // vida corta
    this.colorIdx = colorIdx;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= 0.04;                         // desvanece rápido (15 frames)
  }
  draw() {
    ctx.globalAlpha = this.life * 0.8;
    ctx.fillStyle = COLORS[this.colorIdx];
    ctx.fillRect(this.x, this.y, CELL * 0.35, CELL * 0.35); // más pequeñas
    ctx.globalAlpha = 1;
  }
}

function addParticlesForRow(row) {
  for (let c = 0; c < COLS; c++) {
    if (board[row] && board[row][c]) {
      for (let i = 0; i < 2; i++) {  // solo 2 por celda (antes 3)
        particles.push(new Particle(
          c * CELL + Math.random() * CELL,
          row * CELL + Math.random() * CELL,
          board[row][c]
        ));
      }
    }
  }
}

// ======================== LOGROS Y NOTIFICACIONES =========================
function showAchievement(name) {
  const toast = document.createElement('div');
  toast.className = 'achievement-toast';
  toast.textContent = `🏆 LOGRO: ${name}`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
  if(soundEnabled) soundAchievement();
}
function checkAchievements() {
  let unlockedAny = false;
  for (let key in achievements) {
    if (!achievements[key].unlocked && achievements[key].condition()) {
      achievements[key].unlocked = true;
      showAchievement(achievements[key].name);
      unlockedAny = true;
    }
  }
  if (unlockedAny && autoSave) autoSaveGame();
}
function unlockTetrisAchievement() {
  if (!achievements.tetris_4.unlocked) {
    achievements.tetris_4.unlocked = true;
    showAchievement('Tetris! (4 líneas)');
    autoSaveGame();
  }
}

// ======================== GUARDADO AUTOMÁTICO =========================
function autoSaveGame() {
  const save = {
    board, score, lines, level, nextPiece, holdPiece, difficulty, timeAttackMode, timeLeft,
    achievements, hiScore, combo, version: 2, timestamp: Date.now()
  };
  localStorage.setItem('tetris_save_deluxe', JSON.stringify(save));
}
function autoLoadGame() {
  const saved = localStorage.getItem('tetris_save_deluxe');
  if (!saved) return false;
  try {
    const data = JSON.parse(saved);
    if (Date.now() - data.timestamp < 86400000) {
      board = data.board;
      score = data.score;
      lines = data.lines;
      level = data.level;
      nextPiece = data.nextPiece;
      holdPiece = data.holdPiece;
      difficulty = data.difficulty;
      timeAttackMode = data.timeAttackMode;
      timeLeft = data.timeLeft || 0;
      achievements = data.achievements;
      combo = data.combo || 0;
      hiScore = data.hiScore;
      updateDisplay();
      scheduleFall();
      draw();
      drawNext();
      drawHold();
      return true;
    }
  } catch(e) { console.warn(e); }
  return false;
}

// ======================== LÓGICA PRINCIPAL =========================
function newBoard() { return Array.from({length: ROWS}, () => new Array(COLS).fill(0)); }
function randomPiece() { return Math.floor(Math.random() * (PIECES.length - 1)) + 1; }

function startGame(keepSettings = false) {
  initAudio();
  if (autoSaveInterval) clearInterval(autoSaveInterval);
  autoSaveInterval = setInterval(() => { if(running && !paused) autoSaveGame(); }, 30000);
  board = newBoard();
  score = 0; lines = 0; level = 1; combo = 0;
  hiScore = parseInt(localStorage.getItem('tetris_hi_deluxe') || '0');
  gameOver = false; paused = false; running = true;
  canHold = true; holdPiece = null;
  nextPiece = randomPiece();
  particles = [];
  if (timeAttackMode) timeLeft = 90;
  spawnPiece();
  updateDisplay();
  clearInterval(fallTimer);
  scheduleFall();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('btn-pause').textContent = '⏸';
  draw();
}

function spawnPiece() {
  piece = nextPiece;
  nextPiece = randomPiece();
  const shape = PIECES[piece];
  pieceX = Math.floor((COLS - shape[0].length) / 2);
  pieceY = 0;
  if (collides(0, 0)) endGame();
  drawNext();
  drawHold();
}

function scheduleFall() {
  clearInterval(fallTimer);
  let speed = SPEEDS[difficulty] * Math.pow(DIFF_FACTOR[difficulty], level - 1);
  if (timeAttackMode) speed = Math.max(speed * 0.9, 80);
  fallTimer = setInterval(() => { if (!paused && running && !gameOver) drop(); }, Math.max(speed, 60));
}

function collides(dx, dy, shape) {
  shape = shape || PIECES[piece];
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++)
      if (shape[r][c]) {
        const nx = pieceX + c + dx, ny = pieceY + r + dy;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if (ny >= 0 && board[ny][nx]) return true;
      }
  return false;
}

function drop() {
  if (collides(0, 1)) placePiece();
  else { pieceY++; draw(); }
}

function hardDrop() {
  let dist = 0;
  while (!collides(0, dist + 1)) dist++;
  pieceY += dist;
  score += dist * 3;
  placePiece();
}

function placePiece() {
  const shape = PIECES[piece];
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++)
      if (shape[r][c] && pieceY + r >= 0)
        board[pieceY + r][pieceX + c] = piece;
  soundPlace();
  clearLines();
  canHold = true;
  spawnPiece();
  draw();
  if (timeAttackMode && running && !gameOver) updateTimeAttack();
}

function clearLines() {
  let cleared = 0;
  const rowsCleared = [];
  for (let r = ROWS-1; r >= 0; r--) {
    if (board[r].every(c => c !== 0)) {
      rowsCleared.push(r);
      board.splice(r,1);
      board.unshift(new Array(COLS).fill(0));
      cleared++;
      r++;
    }
  }
  if (cleared) {
    for (let row of rowsCleared) addParticlesForRow(row);
    const basePoints = [0, 100, 300, 500, 800];
    let addScore = (basePoints[cleared] || 800) * level;
    if (combo > 0) addScore += combo * 50;
    score += addScore;
    lines += cleared;
    if (cleared === 4) unlockTetrisAchievement();
    combo++;
    const newLevel = Math.floor(lines / 10) + 1;
    if (newLevel > level) { level = newLevel; soundLevelUp(); scheduleFall(); }
    else soundLine(cleared);
    if (score > hiScore) { hiScore = score; localStorage.setItem('tetris_hi_deluxe', hiScore); }
    canvas.classList.add('flash');
    setTimeout(() => canvas.classList.remove('flash'), 300);
    updateDisplay();
    checkAchievements();
    if (timeAttackMode && running) {
      timeLeft += cleared * 2;
      updateTimeAttackUI();
    }
  } else { combo = 0; }
  updateComboDisplay();
}

function endGame() {
  running = false; gameOver = true;
  clearInterval(fallTimer);
  soundGameOver();
  if (timeAttackMode) timeLeft = 0;
  setTimeout(() => {
    const ov = document.getElementById('overlay');
    document.getElementById('overlay-msg').textContent = timeAttackMode && timeLeft<=0 ? 'TIEMPO AGOTADO' : 'GAME OVER';
    const sc = document.getElementById('overlay-score');
    sc.style.display = 'block';
    sc.textContent = `PUNTOS: ${score}`;
    document.getElementById('overlay-btn').textContent = '↺ REINICIAR';
    ov.classList.remove('hidden');
  }, 500);
  autoSaveGame();
}

function togglePause() { if (!running) return; paused = !paused; document.getElementById('btn-pause').textContent = paused ? '▶' : '⏸'; draw(); }

function holdCurrent() {
  if (!running || paused || !canHold) return;
  if (holdPiece === null) {
    holdPiece = piece;
    spawnPiece();
  } else {
    const temp = holdPiece;
    holdPiece = piece;
    piece = temp;
    pieceX = Math.floor((COLS - PIECES[piece][0].length) / 2);
    pieceY = 0;
    if (collides(0,0)) endGame();
  }
  canHold = false;
  drawHold();
  draw();
}

function updateTimeAttack() {
  if (timeAttackMode && running && !paused && !gameOver) {
    if (timeLeft <= 0) { endGame(); return; }
    updateTimeAttackUI();
  }
}
function updateTimeAttackUI() {
  document.getElementById('combo-display').parentElement.querySelector('.panel-label').textContent = timeAttackMode ? 'Tiempo' : 'Combo';
  document.getElementById('combo-display').textContent = timeAttackMode ? `${Math.ceil(timeLeft)}s` : combo;
}
function toggleTimeAttack() {
  if (running) return;
  timeAttackMode = !timeAttackMode;
  document.getElementById('btn-timeattack').style.borderColor = timeAttackMode ? 'var(--neon-green)' : 'var(--dim)';
  document.getElementById('btn-timeattack').style.color = timeAttackMode ? 'var(--neon-green)' : 'var(--text)';
  updateTimeAttackUI();
}

// ======================== DIBUJO =========================
function draw() {
  ctx.fillStyle = '#020210';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  for(let r=0;r<=ROWS;r++){ ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(canvas.width,r*CELL); ctx.stroke(); }
  for(let c=0;c<=COLS;c++){ ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,canvas.height); ctx.stroke(); }
  // board
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) drawCell(ctx,c,r,board[r][c]);
  // ghost
  if(running && !gameOver){
    let ghostY = pieceY;
    while(!collides(0, ghostY - pieceY + 1)) ghostY++;
    const shape = PIECES[piece];
    for(let r=0;r<shape.length;r++) for(let c=0;c<shape[r].length;c++) if(shape[r][c]) drawCell(ctx,pieceX+c,ghostY+r,shape[r][c],0.2);
  }
  // active piece
  if(running && !gameOver){
    const shape = PIECES[piece];
    for(let r=0;r<shape.length;r++) for(let c=0;c<shape[r].length;c++) if(shape[r][c]) drawCell(ctx,pieceX+c,pieceY+r,shape[r][c]);
  }
  // partículas (se dibujan encima del tablero pero debajo de la interfaz, pero al ser muy efímeras no molestan)
  for(let i=particles.length-1;i>=0;i--) { particles[i].update(); particles[i].draw(); if(particles[i].life<=0) particles.splice(i,1); }
  updateLevelDots();
}
function drawCell(context, x, y, colorIdx, alpha=1) {
  if(!colorIdx) return;
  context.globalAlpha = alpha;
  context.fillStyle = COLORS[colorIdx];
  context.shadowColor = GLOWS[colorIdx];
  context.shadowBlur = 6;
  context.fillRect(x*CELL+1, y*CELL+1, CELL-2, CELL-2);
  context.shadowBlur = 0;
  context.globalAlpha = 1;
}
function drawNext() {
  nctx.fillStyle = '#020210'; nctx.fillRect(0,0,nextCanvas.width,nextCanvas.height);
  const shape = PIECES[nextPiece];
  const size = 18;
  const offX = (nextCanvas.width - (shape[0].length*size))/2;
  const offY = (nextCanvas.height - (shape.length*size))/2;
  for(let r=0;r<shape.length;r++) for(let c=0;c<shape[r].length;c++) if(shape[r][c]){ nctx.fillStyle=COLORS[shape[r][c]]; nctx.fillRect(offX+c*size, offY+r*size, size-1, size-1); }
}
function drawHold() {
  hctx.fillStyle = '#020210'; hctx.fillRect(0,0,holdCanvas.width,holdCanvas.height);
  if(holdPiece){
    const shape = PIECES[holdPiece];
    const size = 18;
    const offX = (holdCanvas.width - (shape[0].length*size))/2;
    const offY = (holdCanvas.height - (shape.length*size))/2;
    for(let r=0;r<shape.length;r++) for(let c=0;c<shape[r].length;c++) if(shape[r][c]){ hctx.fillStyle=COLORS[shape[r][c]]; hctx.fillRect(offX+c*size, offY+r*size, size-1, size-1); }
  }
}
function updateDisplay(){
  document.getElementById('score-display').textContent = score;
  document.getElementById('hi-display').textContent = hiScore;
  document.getElementById('lines-display').textContent = lines;
  document.getElementById('level-display').textContent = level;
  updateTimeAttackUI();
}
function updateComboDisplay() { document.getElementById('combo-display').textContent = timeAttackMode ? `${Math.ceil(timeLeft)}s` : combo; }
function updateLevelDots(){ for(let i=1;i<=5;i++) document.getElementById('ld'+i).classList.toggle('active', level>=i); }

// ======================== INPUT =========================
function moveLeft() { if(running&&!paused&&!collides(-1,0)){ pieceX--; soundMove(); draw(); } }
function moveRight(){ if(running&&!paused&&!collides(1,0)){ pieceX++; soundMove(); draw(); } }
function moveDown(){ if(running&&!paused){ if(!collides(0,1)){ pieceY++; score++; updateDisplay(); draw(); } else placePiece(); } }
function doRotate(){
  if(!running||paused) return;
  const rot = PIECES[piece].map(row=>[...row]).reverse()[0].map((_,i)=>PIECES[piece].map(row=>row[i]).reverse());
  const kicks = [0,-1,1,-2,2];
  for(let k of kicks){
    if(!collidesShape(rot, pieceX+k, pieceY)){ PIECES[piece]=rot; pieceX+=k; soundRotate(); draw(); return; }
  }
}
function collidesShape(shape, px, py){
  for(let r=0;r<shape.length;r++) for(let c=0;c<shape[r].length;c++) if(shape[r][c]){ let nx=px+c, ny=py+r; if(nx<0||nx>=COLS||ny>=ROWS) return true; if(ny>=0 && board[ny][nx]) return true; }
  return false;
}
// Eventos
document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft'){ e.preventDefault(); moveLeft(); }
  else if(e.key==='ArrowRight'){ e.preventDefault(); moveRight(); }
  else if(e.key==='ArrowDown'){ e.preventDefault(); moveDown(); }
  else if(e.key==='ArrowUp'||e.key==='z'){ e.preventDefault(); doRotate(); }
  else if(e.key===' '){ e.preventDefault(); hardDrop(); }
  else if(e.key==='p') togglePause();
  else if(e.key==='h') holdCurrent();
});
function addBtnEvent(id, fn){ const btn=document.getElementById(id); btn.addEventListener('touchstart',e=>{e.preventDefault(); fn();},{passive:false}); btn.addEventListener('mousedown',e=>{e.preventDefault(); fn();}); }
function addRepeat(id, fn){ const btn=document.getElementById(id); let timer,interval; const start=e=>{ e.preventDefault(); fn(); timer=setTimeout(()=>{ interval=setInterval(fn,70); },250); }; const stop=()=>{ clearTimeout(timer); clearInterval(interval); }; btn.addEventListener('touchstart',start,{passive:false}); btn.addEventListener('touchend',stop); btn.addEventListener('mousedown',start); btn.addEventListener('mouseup',stop); btn.addEventListener('mouseleave',stop); }
addRepeat('btn-left',moveLeft); addRepeat('btn-right',moveRight); addRepeat('btn-down',moveDown);
addBtnEvent('btn-up',doRotate); addBtnEvent('btn-rotate',doRotate); addBtnEvent('btn-drop',hardDrop);
addBtnEvent('btn-start',()=>startGame()); addBtnEvent('btn-pause',togglePause); addBtnEvent('btn-hold',holdCurrent);
addBtnEvent('btn-timeattack',toggleTimeAttack);
document.getElementById('overlay-btn').addEventListener('click',()=>startGame());
document.getElementById('btn-sound').addEventListener('click',()=>{ soundEnabled=!soundEnabled; initAudio(); const btn=document.getElementById('btn-sound'); btn.textContent=soundEnabled?'🔊':'🔇'; btn.classList.toggle('active',soundEnabled); if(soundEnabled && audioCtx && audioCtx.state==='suspended') audioCtx.resume(); });
// Dificultad
['easy','med','hard'].forEach(d=>{ document.getElementById(`diff-${d}`).addEventListener('click',()=>{ difficulty=d==='med'?'medium':d; document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected')); document.getElementById(`diff-${d}`).classList.add('selected'); if(running) scheduleFall(); }); });
// Temas
const themes={ cyberpunk:{bg:'#050510',neonCyan:'#00f5ff',neonPink:'#ff006e',neonYellow:'#ffee00',neonGreen:'#39ff14',text:'#c0c0ff',dim:'#4040a0'}, retro:{bg:'#000000',neonCyan:'#00ff00',neonPink:'#ff00ff',neonYellow:'#ffff00',neonGreen:'#00ff00',text:'#00ff00',dim:'#008800'}, ocean:{bg:'#001133',neonCyan:'#00ccff',neonPink:'#ff66cc',neonYellow:'#ffcc00',neonGreen:'#33ff99',text:'#aaddff',dim:'#2266aa'} };
document.querySelectorAll('.theme-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ const theme=themes[btn.dataset.theme]; if(theme) for(let [k,v] of Object.entries(theme)) document.documentElement.style.setProperty(`--${k}`,v); document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); }); });
// Swipe
canvas.addEventListener('touchstart',e=>{ window.swipeX=e.touches[0].clientX; window.swipeY=e.touches[0].clientY; },{passive:true});
canvas.addEventListener('touchend',e=>{ const dx=e.changedTouches[0].clientX-window.swipeX; const dy=e.changedTouches[0].clientY-window.swipeY; if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>20){ if(dx>0) moveRight(); else moveLeft(); } else if(Math.abs(dy)>20){ if(dy>0) moveDown(); else doRotate(); } },{passive:true});

// Inicialización
hiScore = parseInt(localStorage.getItem('tetris_hi_deluxe') || '0');
document.getElementById('hi-display').textContent = hiScore;
board = newBoard();
draw();
updateTimeAttackUI();
if(autoLoadGame()) { running=true; gameOver=false; paused=false; scheduleFall(); draw(); }
</script>
</body>
